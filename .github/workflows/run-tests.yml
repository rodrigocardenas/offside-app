name: Run Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo, pdo_sqlite, bcmath, ctype, json, tokenizer
          coverage: pcov
          tools: composer

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Copy .env.testing file
        run: cp .env.testing .env

      - name: Generate application key (if needed)
        run: php artisan key:generate --force || true

      - name: Run migrations (testing)
        run: php artisan migrate --env=testing --no-interaction --force

      - name: Run PHPUnit Tests
        run: php artisan test --no-coverage 2>&1

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: storage/logs/
          retention-days: 7
